# Install this file to /etc/nginx/conf.d/sirius-plus-limits.conf.
# These zones must be declared in Nginx's http context, not inside server {}.
limit_req_zone $binary_remote_addr zone=sirius_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=sirius_partner:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=sirius_per_ip:10m;
