<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Пирожковый Диспетчер - технические работы</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; box-sizing: border-box; font-family: Arial, sans-serif; background: #f4f7fb; color: #1e293b; }
    main { width: min(480px, 100%); text-align: center; }
    h1 { margin: 0 0 14px; font-size: 28px; }
    p { margin: 0 0 10px; line-height: 1.55; color: #526277; }
    a { color: #1769e0; }
    @media (prefers-color-scheme: dark) { body { background: #111827; color: #f3f4f6; } p { color: #b7c0cf; } a { color: #78adff; } }
  </style>
</head>
<body>
  <main>
    <h1>Пирожковый Диспетчер перезагружается</h1>
    <p>Сайт временно недоступен или обновляется. Подожди минуту и попробуй ещё раз.</p>
    <p>Если проблема не проходит, напиши <a href="https://t.me/sonofstange">@sonofstange</a> в Telegram или Discord.</p>
  </main>
</body>
</html>
