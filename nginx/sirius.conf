# /etc/nginx/sites-available/sirius

server {
    listen 80;
    listen [::]:80;
    server_name sirius.rusanoff.ru;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name sirius.rusanoff.ru;

    ssl_certificate /etc/letsencrypt/live/sirius.rusanoff.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sirius.rusanoff.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    include /opt/sirius-plus/nginx/error-pages.conf;

    location /static/ {
        alias /opt/sirius-plus/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location / {
        # Do not serve an app page while its API is stopping or starting.
        auth_request /healthz;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
