{% extends "base.html" %}
{% block title %}Админ-панель — Пирожковый Диспетчер{% endblock %}
{% block content %}
<div class="page">
    <div class="page__header">
        <h1 class="page__title">Админ-панель</h1>
    </div>

    <div class="auth-card__help" style="background:var(--bg-card);padding:24px;border-radius:var(--radius);box-shadow:var(--shadow);line-height:1.8">
        <h2 style="font-size:18px;margin-bottom:16px">Выдать коины</h2>
        <div class="form-group" style="position:relative">
            <label class="form-label">Начни вводить имя или UID</label>
            <input type="text" class="form-input" id="grant-uid" placeholder="Имя или UID..." style="width:100%" autocomplete="off"
                   oninput="filterSuggestions()" onfocus="filterSuggestions()">
            <div id="suggestions" style="position:absolute;top:100%;left:0;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);max-height:200px;overflow-y:auto;display:none;z-index:100"></div>
        </div>
        <div class="form-group">
            <label class="form-label">Количество коинов</label>
            <input type="number" class="form-input" id="grant-amount" value="1" min="1" style="width:100%">
        </div>
        <button class="btn btn-primary" onclick="grantCoins()">Выдать коины</button>
        <div id="grant-result" class="alert" style="display:none;margin-top:16px"></div>

        <h2 style="font-size:18px;margin:32px 0 16px">Промокоды</h2>
        <div class="form-group">
            <label class="form-label" for="promocode-code">Код</label>
            <input type="text" class="form-input" id="promocode-code" placeholder="TEST1" maxlength="32" style="width:100%;text-transform:uppercase">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
                <label class="form-label" for="promocode-coins">Сириус Коинов</label>
                <input type="number" class="form-input" id="promocode-coins" value="3" min="1" style="width:100%">
            </div>
            <div class="form-group">
                <label class="form-label" for="promocode-uses">Активаций</label>
                <input type="number" class="form-input" id="promocode-uses" value="1" min="1" style="width:100%">
            </div>
        </div>
        <button class="btn btn-primary" onclick="createPromocode()">Создать промокод</button>
        <div id="promocode-result" class="alert" style="display:none;margin-top:12px"></div>
        <div id="promocode-list" class="profile-list" style="margin-top:12px"><div class="loading">Загрузка...</div></div>

        <h2 style="font-size:18px;margin:32px 0 16px">Все пользователи</h2>
        <input type="text" class="form-input" id="search-input" placeholder="Поиск по имени или UID..." style="width:100%;margin-bottom:16px"
               oninput="renderTable()">
        <div id="users-list">
            <div class="loading">Загрузка...</div>
        </div>

        <h2 style="font-size:18px;margin:32px 0 16px">Обращения пользователей</h2>
        <div id="feedback-list">
            <div class="loading">Загрузка...</div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="admin-user-modal" onclick="closeModal('admin-user-modal')">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal__header">
            <h2>Профиль пользователя</h2>
            <button class="modal__close" type="button" onclick="closeModal('admin-user-modal')" aria-label="Закрыть">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="modal__body" id="admin-user-modal-body"><div class="loading">Загрузка...</div></div>
    </div>
</div>

<script>
let allUsers = [];
let _suppressSuggestions = false;

async function loadPromocodes() {
    const container = document.getElementById('promocode-list');
    try {
        const response = await fetch('/api/admin/promocodes');
        const data = await response.json();
        const codes = data.promocodes || [];
        container.innerHTML = codes.length ? codes.map(item => `
            <div class="profile-list-item">
                <div class="profile-list-item__main">
                    <div class="profile-list-item__title">${escapeHtml(item.code)}</div>
                    <div class="profile-list-item__meta">+${item.coin_amount} коинов · ${item.used_count} из ${item.max_uses} активаций</div>
                </div>
            </div>`).join('') : '<div class="profile-empty">Промокодов пока нет</div>';
    } catch (e) {
        container.innerHTML = '<div class="alert alert-error">Не удалось загрузить промокоды</div>';
    }
}

async function createPromocode() {
    const code = document.getElementById('promocode-code').value.trim();
    const coin_amount = Number(document.getElementById('promocode-coins').value);
    const max_uses = Number(document.getElementById('promocode-uses').value);
    const result = document.getElementById('promocode-result');
    result.style.display = 'block';
    try {
        const response = await fetch('/api/admin/promocodes', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({code, coin_amount, max_uses}),
        });
        const data = await response.json();
        if (!data.ok) throw new Error(data.error || 'Ошибка создания');
        result.className = 'alert alert-success';
        result.textContent = `Промокод ${data.code} создан`;
        document.getElementById('promocode-code').value = '';
        loadPromocodes();
    } catch (e) {
        result.className = 'alert alert-error';
        result.textContent = e.message;
    }
}

async function loadUsers() {
    const container = document.getElementById('users-list');
    try {
        const resp = await fetch('/api/admin/users');
        const data = await resp.json();
        if (!data.ok) {
            container.innerHTML = '<div class="alert alert-error">Ошибка: ' + (data.error || 'Неизвестная') + '</div>';
            return;
        }
        allUsers = data.users || [];
        renderTable();
        filterSuggestions();
    } catch (e) {
        container.innerHTML = '<div class="alert alert-error">Ошибка загрузки: ' + escapeHtml(e.message) + '</div>';
    }
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }

function fmtDate(ts) {
    return new Date(ts * 1000).toLocaleString('ru-RU', {
        day: '2-digit',
        month: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
    });
}

async function loadFeedback() {
    const container = document.getElementById('feedback-list');
    try {
        const resp = await fetch('/api/admin/feedback');
        const data = await resp.json();
        if (!data.ok) {
            container.innerHTML = '<div class="alert alert-error">Ошибка: ' + (data.error || 'Неизвестная') + '</div>';
            return;
        }
        const messages = data.messages || [];
        if (messages.length === 0) {
            container.innerHTML = '<p style="color:var(--text-muted)">Обращений пока нет</p>';
            return;
        }
        container.innerHTML = messages.map(m => `
            <div class="admin-feedback-card" style="background:${m.is_read ? 'transparent' : 'color-mix(in srgb, var(--primary) 10%, var(--bg-card))'}">
                <div style="display:flex;gap:8px;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
                    <div>
                        <strong>${escapeHtml(m.name || m.user_id || 'Аноним')}</strong>
                        <div style="color:var(--text-muted);font-size:12px">${fmtDate(m.created_at)}${m.user_id ? ' · ' + escapeHtml(m.user_id) : ''}</div>
                    </div>
                    <div style="display:flex;gap:6px;white-space:nowrap">
                        <button class="btn btn-sm btn-outline" onclick="toggleFeedbackRead(${m.id}, ${m.is_read ? 'false' : 'true'})">${m.is_read ? 'Не прочитано' : 'Прочитано'}</button>
                        <button class="btn btn-sm btn-outline" onclick="hideFeedback(${m.id})">Скрыть</button>
                        <button class="btn btn-sm btn-outline" onclick="deleteFeedback(${m.id})">Удалить</button>
                    </div>
                </div>
                <div class="feedback-thread">
                    <div class="feedback-message feedback-message--user"><div class="feedback-message__meta">${escapeHtml(m.name || 'Пользователь')} · ${fmtDate(m.created_at)}</div><div>${escapeHtml(m.message)}</div></div>
                    ${(m.replies || []).map(reply => `<div class="feedback-message feedback-message--${reply.sender_type}"><div class="feedback-message__meta">${escapeHtml(reply.sender_name || (reply.sender_type === 'admin' ? 'Администратор' : 'Пользователь'))} · ${fmtDate(reply.created_at)}</div><div>${escapeHtml(reply.message)}</div></div>`).join('')}
                </div>
                <div class="feedback-reply-form">
                    <textarea class="form-textarea" id="answer-${m.id}" rows="2" placeholder="Написать пользователю..."></textarea>
                    <button class="btn btn-primary btn-sm" onclick="answerFeedback(${m.id})">Ответить</button>
                </div>
            </div>
        `).join('');
    } catch (e) {
        container.innerHTML = '<div class="alert alert-error">Ошибка загрузки: ' + escapeHtml(e.message) + '</div>';
    }
}

async function toggleFeedbackRead(id, isRead) {
    await fetch(`/api/admin/feedback/${id}/read`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({is_read: isRead}),
    });
    loadFeedback();
}

async function deleteFeedback(id) {
    if (!confirm('Удалить обращение?')) return;
    await fetch(`/api/admin/feedback/${id}`, {method: 'DELETE'});
    loadFeedback();
}

async function hideFeedback(id) {
    if (!confirm('Скрыть обращение в админ-панели? У пользователя оно останется.')) return;
    await fetch(`/api/admin/feedback/${id}/hide`, {method: 'POST'});
    loadFeedback();
}

async function answerFeedback(id) {
    const textarea = document.getElementById(`answer-${id}`);
    const answer = (textarea.value || '').trim();
    if (!answer) {
        alert('Ответ не может быть пустым');
        return;
    }
    const resp = await fetch(`/api/admin/feedback/${id}/answer`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({answer}),
    });
    const data = await resp.json();
    if (!data.ok) {
        alert(data.error || 'Ошибка');
        return;
    }
    loadFeedback();
}

function renderTable() {
    const container = document.getElementById('users-list');
    const q = (document.getElementById('search-input').value || '').toLowerCase();
    const filtered = allUsers.filter(u =>
        u.uid.toLowerCase().includes(q) || (u.name || '').toLowerCase().includes(q)
    );
    if (filtered.length === 0) {
        container.innerHTML = '<p style="color:var(--text-muted)">Ничего не найдено</p>';
        return;
    }
    let html = '<div class="admin-users-table-wrap"><table class="admin-users-table"><tr><th>Пользователь</th><th>Коины</th><th>Доверие</th><th>Управление</th></tr>';
    for (const u of filtered) {
        const trust = Number(u.trust_level || 2);
        const safeUid = u.uid.replace(/'/g,"\\'");
        const trustHtml = u.is_admin
            ? '<span class="badge badge-success">0 · Админ</span>'
            : `<select class="form-select admin-users-table__select" onchange="setTrust('${safeUid}', this.value)">
                <option value="1" ${trust === 1 ? 'selected' : ''}>1 · Доверенный</option>
                <option value="2" ${trust === 2 ? 'selected' : ''}>2 · Обычный</option>
                <option value="3" ${trust === 3 ? 'selected' : ''}>3 · Недоверенный</option>
            </select>`;
        html += `<tr>
            <td class="admin-users-table__person">
                <button class="admin-user-link" type="button" onclick="showAdminUser('${safeUid}')" title="Открыть профиль пользователя">${escapeHtml(u.name || '(без имени)')}</button>
                <button class="admin-user-uid" type="button" onclick="fillUid('${safeUid}')" title="Подставить UID в выдачу коинов">${escapeHtml(u.uid)}</button>
            </td>
            <td class="admin-users-table__coins"><strong>${u.coins}</strong></td>
            <td>${trustHtml}</td>
            <td>
                <div class="admin-users-table__actions">
                    <button class="btn btn-sm btn-outline admin-users-table__action-btn" onclick="startGrant('${safeUid}')" title="Выдать Сириус Коины" aria-label="Выдать Сириус Коины">
                        <span class="material-symbols-outlined">paid</span>
                    </button>
                    <button class="btn btn-sm ${u.is_admin ? 'btn-primary' : 'btn-outline'} admin-users-table__admin-btn" onclick="setAdmin('${safeUid}', ${u.is_admin ? 'false' : 'true'})" title="${u.is_admin ? 'Снять права администратора' : 'Назначить администратором'}">
                        <span class="material-symbols-outlined">admin_panel_settings</span>
                    </button>
                </div>
            </td>
        </tr>`;
    }
    html += '</table></div>';
    container.innerHTML = html;
}

async function showAdminUser(uid) {
    const modal = document.getElementById('admin-user-modal');
    const body = document.getElementById('admin-user-modal-body');
    body.innerHTML = '<div class="loading">Загрузка...</div>';
    modal.style.display = 'flex';
    try {
        const response = await fetch('/api/admin/users/' + encodeURIComponent(uid));
        const data = await response.json();
        if (!data.ok) throw new Error(data.error || 'Не удалось загрузить профиль');
        const u = data.user;
        const trustNames = {0: 'Админ', 1: 'Доверенный', 2: 'Обычный', 3: 'Недоверенный'};
        const loginNames = {password: 'Пароль', token: 'Токен'};
        const fmt = value => value ? fmtDate(value) : '—';
        body.innerHTML = `<table class="info-table">
            <tr><td>Имя</td><td>${escapeHtml(u.name || '—')}</td></tr>
            <tr><td>Команда Sirius</td><td>${escapeHtml(u.team || 'Не указана в Sirius')}</td></tr>
            <tr><td>UID</td><td class="mono">${escapeHtml(u.uid)}</td></tr>
            <tr><td>Уровень</td><td>${escapeHtml(trustNames[u.trustLevel] || 'Обычный')}</td></tr>
            <tr><td>Коины</td><td><strong>${u.coins}</strong>${u.reservedCoins ? ` · ${u.reservedCoins} в резерве` : ''}</td></tr>
            <tr><td>Создан</td><td>${escapeHtml(fmt(u.createdAt))}</td></tr>
            <tr><td>Последняя активность</td><td>${escapeHtml(fmt(u.lastActive))}</td></tr>
            <tr><td>Тип входа</td><td>${escapeHtml(loginNames[u.loginType] || '—')}</td></tr>
            <tr><td>Активно следит</td><td>${u.watchingCount}</td></tr>
            <tr><td>Записан</td><td>${u.registeredCount}</td></tr>
            <tr><td>Будильников</td><td>${u.reminderCount}</td></tr>
        </table>`;
    } catch (error) {
        body.innerHTML = '<div class="alert alert-error">' + escapeHtml(error.message) + '</div>';
    }
}

function fillUid(uid) {
    document.getElementById('grant-uid').value = uid;
    document.getElementById('suggestions').style.display = 'none';
}

function startGrant(uid) {
    fillUid(uid);
    const input = document.getElementById('grant-amount');
    document.getElementById('grant-uid').scrollIntoView({behavior: 'smooth', block: 'center'});
    input.focus();
}

function filterSuggestions() {
    const input = document.getElementById('grant-uid');
    const q = (input.value || '').toLowerCase();
    const box = document.getElementById('suggestions');
    if (!q) { box.style.display = 'none'; return; }
    const matches = allUsers.filter(u =>
        u.uid.toLowerCase().includes(q) || (u.name || '').toLowerCase().includes(q)
    ).slice(0, 8);
    if (matches.length === 0) { box.style.display = 'none'; return; }
    let html = '';
    for (const u of matches) {
        html += `<div style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:14px"
                    onmousedown="event.preventDefault();fillUid('${u.uid.replace(/'/g,"\\'")}')">
            <strong>${escapeHtml(u.name || '(без имени)')}</strong>
            <span style="color:var(--text-muted);margin-left:8px;font-size:12px">${escapeHtml(u.uid)}</span>
            <span style="float:right;color:var(--accent)">${u.coins}🪙</span>
        </div>`;
    }
    box.innerHTML = html;
    box.style.display = 'block';
}

document.addEventListener('click', function(e) {
    if (!e.target.closest('#grant-uid') && !e.target.closest('#suggestions')) {
        document.getElementById('suggestions').style.display = 'none';
    }
});

async function setTrust(uid, trustLevel) {
    try {
        const resp = await fetch('/api/admin/set-trust', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({uid, trust_level: Number(trustLevel)}),
        });
        const data = await resp.json();
        if (!data.ok) {
            alert(data.error || 'Ошибка');
        }
        loadUsers();
    } catch (e) {
        alert('Ошибка соединения: ' + e.message);
    }
}

async function setAdmin(uid, isAdmin) {
    const action = isAdmin ? 'назначить админом' : 'снять админку';
    if (!confirm(`Точно ${action}?`)) return;
    try {
        const resp = await fetch('/api/admin/set-admin', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({uid, is_admin: isAdmin}),
        });
        const data = await resp.json();
        if (!data.ok) {
            alert(data.error || 'Ошибка');
        }
        loadUsers();
    } catch (e) {
        alert('Ошибка соединения: ' + e.message);
    }
}

async function grantCoins() {
    const uid = document.getElementById('grant-uid').value.trim();
    const amount = parseInt(document.getElementById('grant-amount').value);
    const result = document.getElementById('grant-result');

    if (!uid) {
        result.style.display = 'block';
        result.className = 'alert alert-error';
        result.textContent = 'Выбери пользователя из списка или введи UID';
        return;
    }
    if (!amount || amount < 1) {
        result.style.display = 'block';
        result.className = 'alert alert-error';
        result.textContent = 'Количество должно быть > 0';
        return;
    }

    result.style.display = 'block';
    result.className = 'alert';
    result.textContent = 'Выдаю...';

    try {
        const resp = await fetch('/api/admin/grant-coins', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({uid, amount}),
        });
        const data = await resp.json();
        if (data.ok) {
            result.className = 'alert alert-success';
            result.textContent = `Выдано ${amount} коинов. Новый баланс: ${data.new_balance}`;
            document.getElementById('grant-uid').value = '';
            document.getElementById('grant-amount').value = '1';
            loadUsers();
        } else {
            result.className = 'alert alert-error';
            result.textContent = (data.error || 'Ошибка');
        }
    } catch (e) {
        result.className = 'alert alert-error';
        result.textContent = 'Ошибка соединения: ' + e.message;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadUsers();
    loadFeedback();
    loadPromocodes();
});
</script>
{% endblock %}
